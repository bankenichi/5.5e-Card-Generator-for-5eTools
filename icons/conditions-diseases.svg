<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Eye outline -->
  <path d="M12,40 Q40,14 68,40 Q40,66 12,40 Z" fill="none" stroke="#5a4a2f" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Iris -->
  <circle cx="40" cy="40" r="10" fill="none" stroke="#5a4a2f" stroke-width="2"/>
  <!-- Pupil -->
  <circle cx="40" cy="40" r="4" fill="#5a4a2f"/>
  <!-- Crack through eye (affliction) -->
