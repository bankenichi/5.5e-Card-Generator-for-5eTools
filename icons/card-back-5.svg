<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 1050" width="2.5in" height="3.5in">
  <defs>
    <radialGradient id="cb2-bg" cx="50%" cy="50%" r="72%">
      <stop offset="0%"   stop-color="#e8c870" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6a4008" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="cb2-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#fff4c0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d4a030" stop-opacity="0"/>
    </radialGradient>
    <filter id="cb2-noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.4 0.3" numOctaves="4" seed="5" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="gn"/>
      <feBlend in="SourceGraphic" in2="gn" mode="multiply" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <!-- Parchment base -->
  <rect width="750" height="1050" rx="24" fill="#e8c060"/>
  <rect width="750" height="1050" rx="24" fill="#d4a030" opacity="0.30"/>
  <rect width="750" height="1050" rx="24" fill="url(#cb2-glow)"/>
  <rect width="750" height="1050" rx="24" fill="url(#cb2-bg)"/>
  <rect width="750" height="1050" rx="24" fill="#c09020" opacity="0.10" filter="url(#cb2-noise)"/>
  <!-- Border -->
  <rect x="18"  y="18"  width="714" height="1014" rx="18" fill="none" stroke="#7a5818" stroke-width="3.5" opacity="0.6"/>
  <rect x="28"  y="28"  width="694" height="994"  rx="14" fill="none" stroke="#7a5818" stroke-width="1.4" opacity="0.32"/>
  <rect x="44"  y="44"  width="662" height="962"  rx="10" fill="none" stroke="#7a5818" stroke-width="0.7" opacity="0.18"/>

  <!-- ── Compass rose centred at 375,525 ── -->
  <g transform="translate(375,525)" opacity="0.32" stroke="#6a4818" fill="none">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="250" stroke-width="2"/>
    <circle cx="0" cy="0" r="238" stroke-width="0.7"/>
    <!-- 16-point tick ring -->
    <line x1="0" y1="-238" x2="0" y2="-250" stroke-width="2.5"/>
    <line x1="0" y1="238"  x2="0" y2="250"  stroke-width="2.5"/>
    <line x1="-238" y1="0" x2="-250" y2="0" stroke-width="2.5"/>
    <line x1="238"  y1="0" x2="250"  y2="0" stroke-width="2.5"/>
    <!-- 45° -->
    <line x1="168"  y1="-168" x2="177" y2="-177" stroke-width="2"/>
    <line x1="-168" y1="-168" x2="-177" y2="-177" stroke-width="2"/>
    <line x1="168"  y1="168"  x2="177" y2="177"   stroke-width="2"/>
    <line x1="-168" y1="168"  x2="-177" y2="177"  stroke-width="2"/>
    <!-- 22.5° minor ticks (8 of them) -->
    <line x1="92"  y1="-224" x2="96"  y2="-234" stroke-width="1.2"/>
    <line x1="-92" y1="-224" x2="-96" y2="-234" stroke-width="1.2"/>
    <line x1="92"  y1="224"  x2="96"  y2="234"  stroke-width="1.2"/>
    <line x1="-92" y1="224"  x2="-96" y2="234"  stroke-width="1.2"/>
    <line x1="224"  y1="-92" x2="234" y2="-96"  stroke-width="1.2"/>
    <line x1="224"  y1="92"  x2="234" y2="96"   stroke-width="1.2"/>
    <line x1="-224" y1="-92" x2="-234" y2="-96" stroke-width="1.2"/>
    <line x1="-224" y1="92"  x2="-234" y2="96"  stroke-width="1.2"/>
    <!-- 4 primary diamond points (N/S/E/W) -->
    <polygon points="0,-250 18,-180 0,-130 -18,-180" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="0,250  18,180  0,130  -18,180"  stroke-width="2" stroke-linejoin="round"/>
    <polygon points="250,0  180,18  130,0  180,-18"  stroke-width="2" stroke-linejoin="round"/>
    <polygon points="-250,0 -180,18 -130,0 -180,-18" stroke-width="2" stroke-linejoin="round"/>
    <!-- 4 secondary diamond points (NE/SW etc) -->
    <polygon points="177,-177 140,-120 105,-105 120,-140" stroke-width="1.4" stroke-linejoin="round"/>
    <polygon points="-177,-177 -140,-120 -105,-105 -120,-140" stroke-width="1.4" stroke-linejoin="round"/>
    <polygon points="177,177 140,120 105,105 120,140" stroke-width="1.4" stroke-linejoin="round"/>
    <polygon points="-177,177 -140,120 -105,105 -120,140" stroke-width="1.4" stroke-linejoin="round"/>
    <!-- Inner rings -->
    <circle cx="0" cy="0" r="100" stroke-width="1.4"/>
    <circle cx="0" cy="0" r="80"  stroke-width="0.7"/>
    <!-- Center hub -->
    <circle cx="0" cy="0" r="16" stroke-width="2"/>
    <circle cx="0" cy="0" r="6"  fill="#6a4818" stroke="none"/>
  </g>

  <g transform="translate(75,93) scale(3,3)" fill="#6a4818" stroke="#6a4818" opacity="0.65">
    <path d="M100,1 L103.5,5 L100,9 L96.5,5 Z" fill="none" stroke-width="1.2" stroke-linejoin="round"/>
    <circle cx="100" cy="5" r="1" fill="#6a4818" stroke="none"/>
    <path d="M91,3 L93,5 L91,7 L89,5 Z" fill="#6a4818" stroke="none"/>
    <path d="M109,3 L111,5 L109,7 L107,5 Z" fill="#6a4818" stroke="none"/>
    <path d="M85,5 Q79,1.5 73,5" fill="none" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M85,5 Q79,8.5 73,5" fill="none" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="79" cy="5" r="0.8" fill="#6a4818" stroke="none"/>
    <path d="M73,5 Q67,1.5 61,5 T49,5 L8,5" fill="none" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M115,5 Q121,1.5 127,5" fill="none" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M115,5 Q121,8.5 127,5" fill="none" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="121" cy="5" r="0.8" fill="#6a4818" stroke="none"/>
    <path d="M127,5 Q133,1.5 139,5 T151,5 L192,5" fill="none" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="4" cy="5" r="1.2" fill="#6a4818" stroke="none"/>
    <circle cx="196" cy="5" r="1.2" fill="#6a4818" stroke="none"/>
  </g>
  <g transform="translate(75,957) scale(3,-3)" fill="#6a4818" stroke="#6a4818" opacity="0.65">
    <path d="M100,1 L103.5,5 L100,9 L96.5,5 Z" fill="none" stroke-width="1.2" stroke-linejoin="round"/>
    <circle cx="100" cy="5" r="1" fill="#6a4818" stroke="none"/>
    <path d="M91,3 L93,5 L91,7 L89,5 Z" fill="#6a4818" stroke="none"/>
    <path d="M109,3 L111,5 L109,7 L107,5 Z" fill="#6a4818" stroke="none"/>
    <path d="M85,5 Q79,1.5 73,5" fill="none" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M85,5 Q79,8.5 73,5" fill="none" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="79" cy="5" r="0.8" fill="#6a4818" stroke="none"/>
    <path d="M73,5 Q67,1.5 61,5 T49,5 L8,5" fill="none" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M115,5 Q121,1.5 127,5" fill="none" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M115,5 Q121,8.5 127,5" fill="none" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="121" cy="5" r="0.8" fill="#6a4818" stroke="none"/>
    <path d="M127,5 Q133,1.5 139,5 T151,5 L192,5" fill="none" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="4" cy="5" r="1.2" fill="#6a4818" stroke="none"/>
    <circle cx="196" cy="5" r="1.2" fill="#6a4818" stroke="none"/>
  </g>
  <!-- Age spots -->
  <ellipse cx="100" cy="160" rx="42" ry="24" fill="#a07020" opacity="0.06"/>
  <ellipse cx="650" cy="890" rx="52" ry="28" fill="#906010" opacity="0.07"/>
</svg>
