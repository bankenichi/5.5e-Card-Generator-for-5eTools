  <path d="M66,44 Q74,50 70,60" fill="none" stroke="#5a4a2f" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small arcane marks above/below -->
  <line x1="37" y1="16" x2="43" y2="16" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="40" y1="13" x2="40" y2="19" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="37" y1="64" x2="43" y2="64" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="40" y1="61" x2="40" y2="67" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
