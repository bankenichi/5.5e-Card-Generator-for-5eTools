<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 1050" width="2.5in" height="3.5in">
  <defs>
    <radialGradient id="v3-vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%"   stop-color="#e8c870" stop-opacity="0"/>
      <stop offset="85%"  stop-color="#9a6818" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6a4008" stop-opacity="0.75"/>
    </radialGradient>
    <radialGradient id="v3-center" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#fff4c0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d4a030" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="v3-horiz" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8a5c10" stop-opacity="0.2"/>
      <stop offset="50%"  stop-color="#d4a030" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8a5c10" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="v3-noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5 0.4" numOctaves="4" seed="14" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0.3" in="n" result="gn"/>
      <feBlend in="SourceGraphic" in2="gn" mode="multiply" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <!-- Base: rich ochre -->
  <rect width="750" height="1050" rx="24" fill="#e8c060"/>
  <rect width="750" height="1050" rx="24" fill="#d4a030" opacity="0.3"/>
  <rect width="750" height="1050" rx="24" fill="url(#v3-center)"/>
  <rect width="750" height="1050" rx="24" fill="url(#v3-horiz)"/>
  <rect width="750" height="1050" rx="24" fill="url(#v3-vignette)"/>
  <rect width="750" height="1050" rx="24" fill="#c09020" opacity="0.1" filter="url(#v3-noise)"/>
  <!-- Borders: thinner, more refined -->
  <rect x="18" y="18" width="714" height="1014" rx="22" fill="none" stroke="#7a5818" stroke-width="3"   opacity="0.65"/>
  <rect x="30" y="30" width="690" height="990"  rx="16" fill="none" stroke="#7a5818" stroke-width="1"   opacity="0.3"/>
  <!-- Corner flourish lines -->
  <line x1="18"  y1="90"  x2="18"  y2="18"  stroke="#7a5818" stroke-width="1.5" opacity="0.4"/>
  <line x1="18"  y1="18"  x2="90"  y2="18"  stroke="#7a5818" stroke-width="1.5" opacity="0.4"/>
  <line x1="732" y1="90"  x2="732" y2="18"  stroke="#7a5818" stroke-width="1.5" opacity="0.4"/>
  <line x1="732" y1="18"  x2="660" y2="18"  stroke="#7a5818" stroke-width="1.5" opacity="0.4"/>
  <line x1="18"  y1="960" x2="18"  y2="1032" stroke="#7a5818" stroke-width="1.5" opacity="0.4"/>
  <line x1="18"  y1="1032" x2="90" y2="1032" stroke="#7a5818" stroke-width="1.5" opacity="0.4"/>
  <line x1="732" y1="960" x2="732" y2="1032" stroke="#7a5818" stroke-width="1.5" opacity="0.4"/>
  <line x1="732" y1="1032" x2="660" y2="1032" stroke="#7a5818" stroke-width="1.5" opacity="0.4"/>
  <!-- Age spots - subtle -->
  <ellipse cx="100"  cy="180" rx="38" ry="20" fill="#a07020" opacity="0.07"/>
  <ellipse cx="650"  cy="880" rx="45" ry="24" fill="#906010" opacity="0.08"/>
  <ellipse cx="690"  cy="160" rx="25" ry="14" fill="#b08030" opacity="0.06"/>
</svg>
