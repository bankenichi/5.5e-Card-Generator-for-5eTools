<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Outer arcane circle -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="#5a4a2f" stroke-width="2.2"/>
  <!-- Inner circle -->
  <circle cx="40" cy="40" r="18" fill="none" stroke="#5a4a2f" stroke-width="1"/>
  <!-- Staff / wand diagonal -->
  <line x1="20" y1="60" x2="52" y2="18" stroke="#5a4a2f" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Crystal tip -->
  <polygon points="52,18 56,12 60,18 56,22" fill="none" stroke="#5a4a2f" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Orbiting stars -->
  <circle cx="40" cy="12" r="3" fill="none" stroke="#5a4a2f" stroke-width="1.6"/>
  <line x1="40" y1="9" x2="40" y2="7" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="43" y1="10" x2="44.5" y2="8.5" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="37" y1="10" x2="35.5" y2="8.5" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="68" cy="40" r="3" fill="none" stroke="#5a4a2f" stroke-width="1.6"/>
  <line x1="71" y1="40" x2="73" y2="40" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="70" y1="37" x2="71.5" y2="35.5" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="70" y1="43" x2="71.5" y2="44.5" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
</svg>
