<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 180">
  <defs>
    <clipPath id="card">
      <rect x="0" y="0" width="140" height="180" rx="10"/>
    </clipPath>
    <style>
      .c { fill: #2a2a2a; }
      .s { stroke: #2a2a2a; }
      @media (prefers-color-scheme: dark) {
        .c { fill: #d4d0c8; }
        .s { stroke: #d4d0c8; }
      }
    </style>
  </defs>

  <!-- Corner fills clipped to card shape -->
  <g clip-path="url(#card)" class="c">
    <polygon points="0,0    140,0   70,40"/>
    <polygon points="140,0  140,180 115,90"/>
    <polygon points="140,180 0,180  70,140"/>
    <polygon points="0,180  0,0     25,90"/>
  </g>

  <!-- Card border -->
  <rect x="0" y="0" width="140" height="180" rx="10" fill="none" class="s" stroke-width="6"/>

  <!-- Diamond outline -->
  <polygon points="70,40 115,90 70,140 25,90" fill="none" class="s" stroke-width="4" stroke-linejoin="round"/>

  <!-- Centre dot -->
  <circle cx="70" cy="90" r="7" class="c"/>
</svg>
