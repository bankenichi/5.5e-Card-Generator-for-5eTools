<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 260">
  <style>
    :root {
      --bg:     #1e1812;
      --stroke: #c8a96e;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:     #f5ead8;
        --stroke: #5a4a2f;
      }
    }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="220" height="260" rx="10" fill="var(--bg)"/>

  <!-- Card border insets -->
  <rect x="0"  y="0"  width="220" height="260" rx="10" fill="none" stroke="var(--stroke)" stroke-width="2.2"/>
  <rect x="10" y="10" width="200" height="240" rx="7"  fill="none" stroke="var(--stroke)" stroke-width="0.9" opacity="0.5"/>
  <rect x="20" y="20" width="180" height="220" rx="5"  fill="none" stroke="var(--stroke)" stroke-width="0.6" opacity="0.3"/>

  <!-- Outer mirrored triangles -->
  <polygon points="110,38 182,168 38,168"  fill="none" stroke="var(--stroke)" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>
  <polygon points="110,222 38,92 182,92"   fill="none" stroke="var(--stroke)" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>

  <!-- Circles -->
  <circle cx="110" cy="130" r="52" fill="none" stroke="var(--stroke)" stroke-width="1.4" opacity="0.7"/>
  <circle cx="110" cy="130" r="38" fill="none" stroke="var(--stroke)" stroke-width="0.8" opacity="0.4"/>

  <!-- Inscribed diamonds -->
  <polygon points="110,78 162,130 110,182 58,130"  fill="none" stroke="var(--stroke)" stroke-width="1.5" stroke-linejoin="round" opacity="0.75"/>
  <polygon points="110,100 132,130 110,160 88,130" fill="none" stroke="var(--stroke)" stroke-width="0.9" stroke-linejoin="round" opacity="0.45"/>

  <!-- Cross axes -->
  <line x1="110" y1="38"  x2="110" y2="222" stroke="var(--stroke)" stroke-width="0.7" opacity="0.2"/>
  <line x1="38"  y1="130" x2="182" y2="130" stroke="var(--stroke)" stroke-width="0.7" opacity="0.2"/>

  <!-- Cardinal ticks -->
  <line x1="110" y1="72"  x2="110" y2="82"  stroke="var(--stroke)" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="110" y1="178" x2="110" y2="188" stroke="var(--stroke)" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="52"  y1="130" x2="62"  y2="130" stroke="var(--stroke)" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="158" y1="130" x2="168" y2="130" stroke="var(--stroke)" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>

  <!-- Centre ring + dot -->
  <circle cx="110" cy="130" r="8"   fill="none"          stroke="var(--stroke)" stroke-width="1"   opacity="0.5"/>
  <circle cx="110" cy="130" r="3.5" fill="var(--stroke)"                                            opacity="0.7"/>

  <!-- Corner accent diamonds -->
  <polygon points="110,6 116,13 110,20 104,13"   fill="var(--stroke)" opacity="0.5"/>
  <polygon points="110,240 116,247 110,254 104,247" fill="var(--stroke)" opacity="0.5"/>
  <polygon points="6,130 13,124 20,130 13,136"   fill="var(--stroke)" opacity="0.5"/>
  <polygon points="200,130 207,124 214,130 207,136" fill="var(--stroke)" opacity="0.5"/>
</svg>
