<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Chest base -->
  <rect x="14" y="44" width="52" height="24" rx="2" fill="none" stroke="#5a4a2f" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Chest lid (open) -->
  <path d="M14,44 L14,34 Q14,24 40,24 Q66,24 66,34 L66,44" fill="none" stroke="#5a4a2f" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Lid top arc -->
  <path d="M14,38 Q40,20 66,38" fill="none" stroke="#5a4a2f" stroke-width="1.4"/>
  <!-- Lock hasp -->
  <rect x="34" y="52" width="12" height="8" rx="1" fill="none" stroke="#5a4a2f" stroke-width="1.8"/>
  <path d="M36,52 L36,49 Q40,45 44,49 L44,52" fill="none" stroke="#5a4a2f" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Bands -->
  <line x1="14" y1="56" x2="34" y2="56" stroke="#5a4a2f" stroke-width="1.4"/>
  <line x1="46" y1="56" x2="66" y2="56" stroke="#5a4a2f" stroke-width="1.4"/>
  <!-- Shine rays from open chest -->
  <line x1="40" y1="20" x2="40" y2="13" stroke="#5a4a2f" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="22" x2="29" y2="15" stroke="#5a4a2f" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="22" x2="51" y2="15" stroke="#5a4a2f" stroke-width="1.5" stroke-linecap="round"/>
</svg>
