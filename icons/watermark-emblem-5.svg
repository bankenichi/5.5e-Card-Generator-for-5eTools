<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Metatron's cube lite: hexagon + 6 outer circles + inner Star of David + rings -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#8a7450" stroke-width="1.4" opacity="0.35"/>
  <circle cx="60" cy="60" r="46" fill="none" stroke="#8a7450" stroke-width="0.6" opacity="0.2"/>

  <!-- Central circle -->
  <circle cx="60" cy="60" r="20" fill="none" stroke="#8a7450" stroke-width="1.2" opacity="0.32"/>

  <!-- 6 outer circles centred on hexagon vertices (radius 20 from centre) -->
  <circle cx="60"   cy="40"  r="20" fill="none" stroke="#8a7450" stroke-width="0.9" opacity="0.26"/>
  <circle cx="77.3" cy="50"  r="20" fill="none" stroke="#8a7450" stroke-width="0.9" opacity="0.26"/>
  <circle cx="77.3" cy="70"  r="20" fill="none" stroke="#8a7450" stroke-width="0.9" opacity="0.26"/>
  <circle cx="60"   cy="80"  r="20" fill="none" stroke="#8a7450" stroke-width="0.9" opacity="0.26"/>
  <circle cx="42.7" cy="70"  r="20" fill="none" stroke="#8a7450" stroke-width="0.9" opacity="0.26"/>
  <circle cx="42.7" cy="50"  r="20" fill="none" stroke="#8a7450" stroke-width="0.9" opacity="0.26"/>

  <!-- Hexagon connecting the 6 centres -->
  <polygon points="60,40 77.3,50 77.3,70 60,80 42.7,70 42.7,50"
           fill="none" stroke="#8a7450" stroke-width="1.4" stroke-linejoin="round" opacity="0.38"/>

  <!-- Star of David (two triangles) -->
  <polygon points="60,34 80,68 40,68"
           fill="none" stroke="#8a7450" stroke-width="1.2" stroke-linejoin="round" opacity="0.34"/>
  <polygon points="60,86 80,52 40,52"
           fill="none" stroke="#8a7450" stroke-width="1.2" stroke-linejoin="round" opacity="0.34"/>

  <!-- Centre -->
  <circle cx="60" cy="60" r="5"   fill="none" stroke="#8a7450" stroke-width="1.2" opacity="0.4"/>
  <circle cx="60" cy="60" r="2"   fill="#8a7450" opacity="0.36"/>
</svg>
