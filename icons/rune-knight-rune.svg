<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Stone tablet shape -->
  <rect x="18" y="12" width="44" height="56" rx="4" fill="none" stroke="#5a4a2f" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Rounded top (runestone arch) -->
  <path d="M18,28 Q18,12 40,12 Q62,12 62,28" fill="none" stroke="#5a4a2f" stroke-width="2.2"/>
  <!-- Runic character - Elder Futhark style "Tiwaz" (warrior rune) -->
  <line x1="40" y1="24" x2="40" y2="60" stroke="#5a4a2f" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="40" y1="34" x2="28" y2="46" stroke="#5a4a2f" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="40" y1="34" x2="52" y2="46" stroke="#5a4a2f" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Secondary rune marks -->
  <line x1="28" y1="52" x2="52" y2="52" stroke="#5a4a2f" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Corner notches (carved stone detail) -->
  <line x1="18" y1="20" x2="24" y2="20" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="62" y1="20" x2="56" y2="20" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="60" x2="24" y2="60" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="62" y1="60" x2="56" y2="60" stroke="#5a4a2f" stroke-width="1.2" stroke-linecap="round"/>
</svg>
